<VirtualHost *:80>
        ServerName debuginfod.ubuntu.com

        RedirectPermanent / https://debuginfod.ubuntu.com/
</VirtualHost>

<VirtualHost *:443>
        ServerName debuginfod.ubuntu.com

        # Good practices for SSL
        # taken from: <https://mozilla.github.io/server-side-tls/ssl-config-generator/>

        # enable HTTP/2, if available
        Protocols h2 http/1.1

        # intermediate configuration, tweak to your needs
        SSLProtocol             all -SSLv3 -TLSv1 -TLSv1.1
        SSLCipherSuite          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
        SSLHonorCipherOrder     off
        SSLSessionTickets       off

        # HSTS (mod_headers is required) (15768000 seconds = 6 months)
        Header always set Strict-Transport-Security "max-age=15768000"

        SSLEngine On
        SSLCertificateFile /etc/ssl/certs/debuginfod.ubuntu.com.crt
        SSLCertificateKeyFile /etc/ssl/private/debuginfod.ubuntu.com.key
        SSLCertificateChainFile /etc/ssl/certs/debuginfod.ubuntu.com_chain.crt

	#DocumentRoot /var/www/html
       # DocumentRoot /srv/debuginfod-site
       # <Directory /srv/debuginfod-site>
       #         Require all granted
       #         DirectoryIndex debuginfod.html
       # </Directory>

	RewriteEngine on

	#RewriteRule ^(buildid|metrics|fche)($|/) - [L]
	RewriteCond "%{REQUEST_URI}" !^/?(buildid|metrics|fche).*
	RewriteRule ^.*$ https://ubuntu.com/server/docs/service-debuginfod [R=301,L]
	#<Location "/">
	#	RedirectMatch permanent https://ubuntu.com/server/docs/service-debuginfod
	#</Location>

	Alias "/fche" /var/www/html
	<Directory "/var/www/html">
		Require all granted
	</Directory>

        # debuginfod proxy
        ProxyPass /buildid http://127.0.0.1:8002/buildid
        ProxyPassReverse /buildid http://127.0.0.1:8002/buildid

        ProxyPass /metrics http://127.0.0.1:8002/metrics
        ProxyPassReverse /metrics http://127.0.0.1:8002/metrics

	ProxyAddHeaders Off

        # Keep no logs
        #LogFormat "%t \"%r\" %>s %b"

	# Anonymize IPs
	LogFormat "%400,401,403,405,406,410a %400,401,403,405,406,410l %400,401,403,405,406,410u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\"" common
	# Mark requests from the loop-back interface
	#SetEnvIf Remote_Addr "127\.0\.0\.1" dontlog
	# Mark requests for the robots.txt file
	#SetEnvIf Request_URI "^/robots\.txt$" dontlog
	# Log what remains
	CustomLog ${APACHE_LOG_DIR}/access_log common env=!dontlog
</VirtualHost>
